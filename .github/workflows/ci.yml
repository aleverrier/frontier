name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e .

      - name: Build native extension
        run: python setup.py build_ext --inplace

      - name: Tests
        run: python -m pytest -q

      - name: Installed console script smoke
        run: |
          frontier-smoke --K 16 --Delta 100 --shots 3
          frontier-dem-info --backend rotated_surface_d3 --p-location 0.001 --column-order deadline_reorder
          frontier-dem-info --backend bravyi_depth7 --p-location 0.001 --column-order deadline_reorder

      - name: Examples
        run: |
          python examples/minimal_decode.py
          python examples/inspect_dem.py

      - name: CLI help checks
        run: |
          python -m tools.frontier_decoder --help
          python -m tools.dem_loader --help
          python -m tools.frontier_sample_rows --help
          python -m tools.frontier_sample_replay --help
          python -m tools.frontier_bb144_benchmark --help

  macos-smoke:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -e .

      - name: Build native extension
        run: python setup.py build_ext --inplace

      - name: Tests
        run: python -m pytest -q

      - name: Smoke
        run: frontier-smoke --K 16 --Delta 100 --shots 3
